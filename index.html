<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Copy Gacha · 카피가챠</title>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&family=Noto+Sans+JP:wght@200;300;400&display=swap" rel="stylesheet">
<style>
@font-face{
  font-family:'AppleSDGothicNeo';
  font-weight:500;
  src:url('AppleSDGothicNeo-Medium.ttf') format('truetype');
}
@font-face{
  font-family:'AppleSDGothicNeo';
  font-weight:600;
  src:url('AppleSDGothicNeo-SemiBold.ttf') format('truetype');
}
@font-face{
  font-family:'F25BankPrinter';
  src:url('F25_Bank_Printer.ttf') format('truetype');
}
</style>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:    #ffffff;
  --ink:   #1a1a1a;
  --ink2:  rgba(0,0,0,.45);
  --line:  rgba(0,0,0,.18);
  --row-h: 33px;
  --fjp: 'Hiragino Sans','ヒラギノ角ゴシック','Noto Sans JP',sans-serif;
  --fko: 'AppleSDGothicNeo','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  --fen: 'F25BankPrinter','Courier Prime','Courier New',monospace;
}

html{
  width:100%;height:100%;
  background:#e8e8e8;
  -webkit-font-smoothing:antialiased;
  font-synthesis:none;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
body{
  width:393px;
  max-width:100%;
  height:100svh;
  margin:0 auto;
  background:var(--bg);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  position:relative;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}

/* ── Header ── */
.hdr{
  flex:0 0 auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 20px 10px;
}
.hdr-logo{
  font-family:var(--fko);
  font-size:14.4px;
  font-weight:600;
  color:var(--ink);
  letter-spacing:-0.03em;
  line-height:1.902;
}
.hdr-btn{
  font-family:var(--fko);
  font-size:14.4px;
  font-weight:600;
  color:var(--ink);
  background:none;
  border:none;
  cursor:pointer;
  padding:0;
  letter-spacing:-0.03em;
  line-height:1.902;
  -webkit-tap-highlight-color:transparent;
}

/* ── Copy Area ── */
.copy-area{
  flex:1;
  min-height:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:16px 20px;
  overflow:hidden;
}
.copy-content{
  width:100%;
}

/* Typewriter cursor — hidden */
.tw-cursor{ display:none; }

/* Main copy text */
.copy-text{
  width:100%;
  color:var(--ink);
  white-space:pre-wrap;
  word-break:keep-all;
  overflow-wrap:break-word;
  text-align:left;
}
.copy-text.lang-jp{
  font-family:var(--fjp);
  font-weight:400;
  font-size:28px;
  line-height:1.333;
  letter-spacing:0;
}
.copy-text.lang-ko{
  font-family:var(--fko);
  font-weight:500;
  font-size:28px;
  line-height:1.3;
  letter-spacing:-.01em;
}
.copy-text.lang-en{
  font-family:var(--fen);
  font-weight:400;
  font-size:28px;
  line-height:1.286;
  letter-spacing:-.05em;
  word-break:break-word;
}
.copy-text.fade{ opacity:0; }
.copy-text.show{ opacity:1; }

/* Korean translation (shown below JP/EN copies) */
.copy-ko{
  font-family:var(--fko);
  font-size:18px;
  font-weight:600;
  color:var(--ink);
  white-space:pre-wrap;
  word-break:keep-all;
  line-height:1.4;
  letter-spacing:-.03em;
  margin-top:14px;
  text-align:left;
  display:none;
}
.copy-ko.on{ display:block; }

/* ── List Area ── */
.list-area{
  flex:0 0 auto;
  height:231px;
  position:relative;
  overflow:hidden;
  background:#ffffff;
}
/* Top line */
.list-area::before{
  content:'';
  position:absolute;
  left:0; right:0; top:0;
  height:1.5px;
  background:#111111;
  z-index:1;
}

/* Selection bar hidden */
.sel-bar{ display:none; }

/* Static list */
.list-scroll{
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  overflow:hidden;
}

/* List rows */
.list-row{
  height:33px;
  display:flex;
  align-items:center;
  padding:0 16px;
  gap:12px;
  position:relative;
  background:#ffffff;
}
.list-row.idx-row-active{
  background:#111111;
}
.list-row.idx-row-active .row-brand,
.list-row.idx-row-active .row-cntry{
  color:#ffffff;
}
/* Row separator lines */
.list-row::before{
  content:'';
  position:absolute;
  left:11px;
  right:11px;
  top:0;
  height:1.5px;
  background:#000000;
}
/* 활성행 바로 다음 행의 구분선 숨김 */
.list-row.idx-row-active + .list-row::before{
  display:none;
}

.row-brand{
  flex:1;
  font-family:var(--fko);
  font-size:16px;
  font-weight:600;
  line-height:1;
  letter-spacing:-0.03em;
  color:#111111;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.row-cntry{
  font-family:var(--fko);
  font-size:16px;
  font-weight:600;
  line-height:1;
  letter-spacing:-0.03em;
  color:#111111;
  flex-shrink:0;
}

/* ── Makers overlay ── */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.45);
  z-index:100;
  display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;
  transition:opacity .22s;
}
.overlay.on{ opacity:1;pointer-events:all; }
.sheet{
  width:100%;max-width:430px;
  margin:0 auto;
  background:#f8f8f6;
  border-radius:20px 20px 0 0;
  padding:28px 24px 36px;
  transform:translateY(100%);
  transition:transform .32s cubic-bezier(.15,.85,.35,1);
}
.overlay.on .sheet{ transform:translateY(0); }
.sheet-title{
  font-family:var(--fko);
  font-size:18px;font-weight:600;
  letter-spacing:-0.03em;
  line-height:1.902;
  color:var(--ink);
  margin-bottom:18px;
}
.maker{
  display:flex;justify-content:space-between;align-items:center;
  padding:13px 0;
  border-bottom:1px solid rgba(0,0,0,.07);
}
.maker-name{
  font-family:var(--fko);
  font-size:14px;font-weight:600;
  letter-spacing:-0.03em;
  line-height:1.6;
  color:var(--ink);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  flex:1;
  min-width:0;
}
.maker-link{
  font-family:var(--fko);
  font-size:14px;font-weight:600;
  letter-spacing:-0.03em;
  line-height:1.6;
  color:var(--ink2);
  text-decoration:none;
  white-space:nowrap;
  flex-shrink:0;
  margin-left:8px;
}
.maker-link:hover{ text-decoration:underline; }
.sheet-foot{
  text-align:center;
  font-family:var(--fko);
  font-size:18px;font-weight:600;
  letter-spacing:-0.03em;
  line-height:1.902;
  color:rgba(0,0,0,.3);
  margin-top:20px;
}

/* ── Splash ── */
.splash{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,0.9);
  z-index:200;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:opacity .5s ease;
}
.splash.hide{
  opacity:0;
  pointer-events:none;
}
.splash-logo{
  text-align:center;
  user-select:none;
}
.splash-en{
  font-family:var(--fko);
  font-size:36px;
  font-weight:700;
  color:#1a1a1a;
  letter-spacing:-0.02em;
  line-height:1.1;
  display:block;
}
.splash-ko{
  font-family:var(--fko);
  font-size:28px;
  font-weight:700;
  color:#1a1a1a;
  letter-spacing:-0.03em;
  line-height:1.4;
  display:block;
}
</style>
</head>

let ROW_H = 33;
let curIdx = 0;

const copyTextEl = document.getElementById('copyText');
const copyKoEl   = document.getElementById('copyKo');
const listScroll = document.getElementById('listScroll');
const listArea   = document.getElementById('listArea');
const overlay    = document.getElementById('overlay');
const makersBtn  = document.getElementById('makersBtn');

/* ── Build list: 10 rows, curIdx at top, active row highlighted ── */
function buildList(){
  listScroll.innerHTML = '';
  const n = copies.length;
  for(let offset = -3; offset <= 3; offset++){
    const idx = ((curIdx + offset) % n + n) % n;
    const row = document.createElement('div');
    row.className = 'list-row' + (offset === 0 ? ' idx-row-active' : '');
    row.innerHTML =
      `<span class="row-brand">${copies[idx].src}</span>` +
      `<span class="row-cntry">${copies[idx].cntry}</span>`;
    listScroll.appendChild(row);
  }
}

/* ── Typewriter ── */
let twTimer = null;
function typewrite(el, text, speed, onDone){
  if(twTimer){ clearInterval(twTimer); twTimer = null; }
  el.innerHTML = '';
  const cur = document.createElement('span');
  cur.className = 'tw-cursor';
  cur.textContent = '|';
  el.appendChild(cur);
  let i = 0;
  twTimer = setInterval(()=>{
    if(i < text.length){
      cur.insertAdjacentText('beforebegin', text[i]);
      i++;
    } else {
      clearInterval(twTimer); twTimer = null;
      if(onDone) onDone();
    }
  }, speed);
}

/* ── Show copy ── */
function showCopy(idx, animate){
  const c = copies[idx];
  copyKoEl.classList.remove('on');
  copyTextEl.className = 'copy-text lang-' + c.lang;

  if(animate){
    const speed = c.lang === 'en' ? 75 : 60;
    typewrite(copyTextEl, c.main, speed, ()=>{
      const ko = c.ko || '';
      if(ko){ copyKoEl.textContent = ko; copyKoEl.classList.add('on'); }
    });
  } else {
    copyTextEl.textContent = c.main;
    const ko = c.ko || '';
    copyKoEl.textContent = ko;
    copyKoEl.classList.toggle('on', !!ko);
  }
}

/* ── Splash ── */
const splash = document.getElementById('splash');
splash.addEventListener('click', ()=>{
  splash.classList.add('hide');
});

/* ── Tap copy area → random new copy ── */
document.querySelector('.copy-area').addEventListener('click', ()=>{
  let next;
  do { next = Math.floor(Math.random() * copies.length); } while(next === curIdx);
  curIdx = next;
  showCopy(curIdx, true);
  buildList();
});

/* ── Tap list area → random new copy ── */
document.getElementById('listArea').addEventListener('click', ()=>{
  let next;
  do { next = Math.floor(Math.random() * copies.length); } while(next === curIdx);
  curIdx = next;
  showCopy(curIdx, true);
  buildList();
});

/* ── Makers overlay ── */
makersBtn.addEventListener('click', ()=> overlay.classList.add('on'));
overlay.addEventListener('click', e=>{
  if(e.target === overlay) overlay.classList.remove('on');
});

/* ── Resize ── */
window.addEventListener('resize', ()=>{ buildList(); });

/* ── Init ── */
showCopy(curIdx, false);
